apiVersion: apps/v1
kind: Deployment

#Deploymentмқҳ кё°ліё м •ліҙ
metadata:
  name: mysql-deployment #Deployment мқҙлҰ„

#Deploymentмқҳ м„ёл¶Җ м •ліҙ
spec:
  replicas: 1 #мғқм„ұн•  нҢҢл“ңмқҳ ліөм ңліё к°ңмҲҳ
  selector:
    matchLabels:
      app: mysql-db #м•„лһҳм—җм„ң м •мқҳн•ң нҢҢл“ң мӨ‘ appмқҙ 'backend-app'мқҙлқјлҠ” к°’мқ„ к°Җм§„ нҢҢл“ңлҘј м„ нғқ

#л°°нҸ¬н•  нҢҢл“ң м •мқҳ
  template:
    metadata:
      labels:
        app: mysql-db
    spec:
      containers:
        - name: mysql-container #м»Ён…Ңмқҙл„Ҳ мқҙлҰ„
          image: mysql #мӮ¬мҡ©н•  мқҙлҜём§Җ м„ нғқ
          ports:
            - containerPort: 3306 #м»Ён…Ңмқҙл„Ҳм—җм„ң мӮ¬мҡ©н•ҳлҠ” нҸ¬нҠёлҘј лӘ…мӢңм ҒмңјлЎң н‘ңнҳ„
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: mysql-database
          #м»Ён…Ңмқҙл„Ҳ лӮҙм—җм„ң м–ҙл–Ө кІҪлЎңлҘј ліјлҘЁмңјлЎң мӮ¬мҡ©н•  м§Җ м§Җм •
          volumeMounts:
            - name: mysql-persistent-storage #л°‘м—җм„ң м„Өм •н•  volumes.nameкіј к°’мқҙ к°ҷм•„м•ј н•Ё
              mountPath: /var/lib/mysql      #нҢҢл“ңк°Җ мӮ¬мҡ©н•  ліјлҘЁмқ„ м§Җм •
      volumes:
        - name: mysql-persistent-storage #мң„м—җм„ң м„Өм •н•ң volumes.nameкіј к°’мқҙ к°ҷм•„м•ј н•Ё
          persistentVolumeClaim:
            claimName: mysql-pvc #м—°кІ°мӢңнӮ¬ PVCмқҳ nameкіј лҸҷмқј н•ҙм•ј н•Ё